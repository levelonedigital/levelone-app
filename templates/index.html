<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>levelONE | Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f172a, #1e293b); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #fff; border-radius: 12px; padding: 2rem; max-width: 420px; width: 100%; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .brand { font-weight: 800; color: #2563eb; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 class="text-center brand mb-4">levelONE</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}<div class="alert alert-info py-2">{{ messages[0] }}</div>{% endif %}
        {% endwith %}
        <ul class="nav nav-tabs mb-3" id="authTab">
            <li class="nav-item flex-fill"><button class="nav-link active w-100" data-bs-toggle="tab" data-bs-target="#login">Entrar</button></li>
            <li class="nav-item flex-fill"><button class="nav-link w-100" data-bs-toggle="tab" data-bs-target="#register">Unirse</button></li>
        </ul>
        <div class="tab-content">
            <div class="tab-pane fade show active" id="login">
                <form action="/login" method="post">
                    <input type="text" name="username" class="form-control mb-2" placeholder="Usuario" required>
                    <input type="password" name="password" class="form-control mb-2" placeholder="Contraseña" required>
                    <button class="btn btn-primary w-100">Iniciar Sesión</button>
                </form>
            </div>
            <div class="tab-pane fade" id="register">
                <form action="/register" method="post">
                    <input type="text" name="username" class="form-control mb-2" placeholder="Usuario" required>
                    <input type="email" name="email" class="form-control mb-2" placeholder="Email" required>
                    <input type="password" name="password" class="form-control mb-2" placeholder="Contraseña" required>
                    <input type="text" name="cbu" class="form-control mb-2" placeholder="Alias o CBU propio (para recibir $10)" required>
                    <input type="text" name="ref_code" class="form-control mb-2" placeholder="Código de referido (opcional)" style="text-transform:uppercase">
                    <button class="btn btn-success w-100">Registrarse</button>
                </form>
            </div>
        </div>
        <div class="text-center mt-3"><a href="/admin" class="text-muted small">🔒 Acceso Admin</a></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
