<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>levelONE - Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tipografía Inter (Igual a Railway) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* 🎨 TEMA RAILWAY (MODO OSCURO) */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0B0C10; /* Fondo principal Railway */
            color: #E6E8EB; /* Texto blanco suave */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar estilo Railway */
        .navbar {
            background-color: rgba(11, 12, 16, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #272A2E;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar-brand span { color: #E6E8EB; }

        /* Cards estilo Railway */
        .card {
            background-color: #16171C; /* Gris oscuro tarjeta */
            border: 1px solid #272A2E;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            color: #E6E8EB;
            margin-bottom: 1.5rem;
        }
        .card-header {
            background-color: #1C1E23;
            border-bottom: 1px solid #272A2E;
            color: #fff;
            font-weight: 600;
            padding: 1rem 1.25rem;
        }
        .card-body { padding: 1.5rem; }

        /* Inputs estilo Railway */
        .form-control, .form-select {
            background-color: #0B0C10;
            border: 1px solid #272A2E;
            color: #E6E8EB;
            border-radius: 6px;
            padding: 0.6rem 0.8rem;
        }
        .form-control:focus, .form-select:focus {
            background-color: #16171C;
            color: #fff;
            border-color: #5962F9; /* Violeta Railway */
            box-shadow: 0 0 0 3px rgba(89, 98, 249, 0.2);
        }
        .form-control::placeholder { color: #6A6E7A; }

        /* Botones estilo Railway */
        .btn-primary {
            background: linear-gradient(135deg, #5962F9 0%, #7F56D9 100%);
            border: none;
            color: #fff;
            font-weight: 500;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(89, 98, 249, 0.3);
        }
        .btn-outline-secondary {
            color: #9FA3AE;
            border-color: #272A2E;
            background: transparent;
        }
        .btn-outline-secondary:hover {
            background-color: #272A2E;
            color: #fff;
        }
        .btn-success {
            background-color: #10B981;
            border: none;
            border-radius: 6px;
            color: #fff;
        }
        .btn-danger {
            background-color: #EF4444;
            border: none;
            border-radius: 6px;
            color: #fff;
        }

        /* Tablas estilo Railway */
        .table {
            color: #9FA3AE;
            border-color: #272A2E;
            margin-bottom: 0;
        }
        .table thead th {
            background-color: #1C1E23;
            color: #E6E8EB;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            border-bottom: 1px solid #272A2E;
        }
        .table tbody tr { border-bottom: 1px solid #1C1E23; }
        .table tbody td {
            vertical-align: middle;
            padding: 0.8rem;
        }
        
        /* Alerts */
        .alert {
            background-color: #16171C;
            border: 1px solid #272A2E;
            color: #E6E8EB;
        }
        .alert-info { border-left: 4px solid #5962F9; }
        .alert-warning { border-left: 4px solid #F59E0B; color: #FCD34D; }

        /* Badges */
        .badge { font-weight: 500; letter-spacing: 0.03em; padding: 0.35em 0.6em; }
        .bg-primary { background-color: #5962F9 !important; }
        .bg-success { background-color: #064E3B !important; color: #34D399 !important; }
        .bg-warning { background-color: #451A03 !important; color: #FBBF24 !important; }
        .bg-info { background-color: #1E1B4B !important; color: #818CF8 !important; }
        .bg-danger { background-color: #450A0A !important; color: #F87171 !important; }
        .bg-dark { background-color: #16171C !important; color: #E6E8EB !important; }
        .bg-light { background-color: #272A2E !important; color: #E6E8EB !important; }

        /* Marca de agua ajustada a fondo oscuro */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://levelone.uno/static/Logo.png');
            background-repeat: repeat;
            background-size: 350px;
            opacity: 0.03; /* Muy sutil */
            pointer-events: none;
            z-index: 0;
            filter: invert(1); /* Invierte colores para que se vea blanco/gris en negro */
        }
        
        .main-content { flex: 1; position: relative; z-index: 1; }
        .footer {
            background-color: #0B0C10;
            padding: 1rem 0;
            border-top: 1px solid #272A2E;
            margin-top: auto;
            color: #6A6E7A;
        }
        code {
            background-color: #16171C;
            border: 1px solid #272A2E;
            color: #818CF8;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Inter', monospace;
        }
    </style>
</head>
<body>
    <!-- Barra superior -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="https://levelone.uno/static/Logo.png" alt="levelONE" class="me-2" style="height: 32px;">
                <span class="fw-bold fs-5">levelONE</span>
            </a>
        </div>
    </nav>

    <!-- Contenido principal -->
    <main class="main-content py-4">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Pie de página -->
    <footer class="footer text-center">
        <div class="container">
            <small>© 2026 levelONE. Todos los derechos reservados.</small>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
