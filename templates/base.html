<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}levelONE{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #0f172a;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-light: #f8fafc;
            --card-bg: #ffffff;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        body { background-color: var(--bg-light); font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; color: var(--secondary); min-height: 100vh; display: flex; flex-direction: column; }
        .brand-logo { height: 40px; width: auto; }
        .card { border: 1px solid var(--border); border-radius: 14px; background: var(--card-bg); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.04), 0 2px 4px -2px rgba(0,0,0,0.03); transition: all 0.25s ease; }
        .card:hover { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.06); transform: translateY(-1px); }
        .btn-primary { background: var(--primary); border-color: var(--primary); border-radius: 10px; padding: 0.6rem 1rem; font-weight: 500; }
        .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
        .btn-outline-secondary { border-radius: 8px; }
        .form-control { border-radius: 10px; border: 1px solid var(--border); padding: 0.65rem 0.9rem; background-color: #fafbfc; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12); background: #fff; }
        .table { --bs-table-bg: transparent; }
        .table-hover tbody tr:hover { background-color: #f1f5f9; }
        .badge { font-weight: 500; padding: 0.45em 0.85em; border-radius: 8px; }
        .alert { border-radius: 12px; border: none; }
        code { background: #f1f5f9; padding: 3px 7px; border-radius: 6px; font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; color: #334155; }
        main { flex: 1; }
        footer { font-size: 0.85rem; color: var(--text-muted); padding: 1.5rem 0; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <main>{% block content %}{% endblock %}</main>
    <footer class="text-center mt-4 border-top pt-3">
        <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
            <img src="https://levelone.uno/static/Logo.png" alt="levelONE Logo"> class="brand-logo opacity-75">
            <p class="mb-0">© 2026 levelONE. Sistema de gestión y ventas por referidos.</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
