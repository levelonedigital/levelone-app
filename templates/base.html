<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>levelONE - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-canvas: #0B0C10;
            --bg-glass: rgba(22, 23, 28, 0.65);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #E6E8EB;
            --text-sec: #A1A1AA; /* Más claro y legible */
            --accent: #5962F9;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-canvas);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* 🔹 TEXTOS MÁS VISIBLES */
        .text-muted, .text-secondary { color: var(--text-sec) !important; }
        .text-readable { color: #C4C7CE !important; } /* Un tono más claro para subtítulos pequeños */

        /* 🔹 CARDS & TABLAS CON FONDO DIFUSO (Estilo Railway) */
        .card, .table-responsive, .border {
            background: var(--bg-glass) !important;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass) !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            color: var(--text-main);
        }
        .card-header {
            background: rgba(28, 30, 35, 0.5) !important;
            border-bottom: 1px solid var(--border-glass) !important;
            color: #fff;
            font-weight: 600;
        }
        .table { color: var(--text-sec); }
        .table thead th {
            background: rgba(22, 23, 28, 0.4) !important;
            color: #E6E8EB;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border-glass) !important;
        }
        .table tbody tr { border-bottom: 1px solid var(--border-glass) !important; }
        .table tbody td { vertical-align: middle; padding: 0.8rem; }

        /* Inputs */
        .form-control, .form-select {
            background: rgba(11, 12, 16, 0.6) !important;
            border: 1px solid var(--border-glass) !important;
            color: #fff;
            border-radius: 6px;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(11, 12, 16, 0.8) !important;
            color: #fff;
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px rgba(89, 98, 249, 0.2) !important;
        }
        .form-control::placeholder { color: #6A6E7A; }

        /* Botones */
        .btn-primary {
            background: linear-gradient(135deg, #5962F9 0%, #7F56D9 100%);
            border: none;
            color: #fff;
            font-weight: 500;
            border-radius: 6px;
        }
        .btn-outline-secondary {
            color: var(--text-sec);
            border-color: var(--border-glass);
            background: transparent;
        }
        .btn-outline-secondary:hover { background: var(--border-glass); color: #fff; }
        .btn-success { background-color: #10B981; border: none; color: #fff; }
        .btn-danger { background-color: #EF4444; border: none; color: #fff; }

        /* Badges */
        .badge { font-weight: 500; letter-spacing: 0.03em; padding: 0.35em 0.6em; }
        .bg-primary { background-color: var(--accent) !important; color: #fff !important; }
        .bg-success { background-color: rgba(16, 185, 129, 0.2) !important; color: #34D399 !important; }
        .bg-warning { background-color: rgba(245, 158, 11, 0.2) !important; color: #FBBF24 !important; }
        .bg-info { background-color: rgba(89, 98, 249, 0.2) !important; color: #818CF8 !important; }
        .bg-danger { background-color: rgba(239, 68, 68, 0.2) !important; color: #F87171 !important; }
        .bg-dark { background-color: rgba(22, 23, 28, 0.8) !important; color: #E6E8EB !important; }
        .bg-light { background-color: rgba(255, 255, 255, 0.08) !important; color: #E6E8EB !important; }

        /* Alerts */
        .alert {
            background: var(--bg-glass) !important;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass) !important;
            color: #E6E8EB;
        }
        .alert-info { border-left: 4px solid var(--accent) !important; }
        .alert-warning { border-left: 4px solid #F59E0B !important; color: #FCD34D !important; }

        /* Marca de agua (se ve a través del vidrio) */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://levelone.uno/static/Logo.png');
            background-repeat: repeat; background-size: 350px;
            opacity: 0.04; pointer-events: none; z-index: 0;
            filter: invert(1);
        }
        
        .navbar {
            background: rgba(11, 12, 16, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            position: sticky; top: 0; z-index: 1000;
        }
        .main-content { flex: 1; position: relative; z-index: 1; }
        .footer {
            background: var(--bg-canvas);
            padding: 1rem 0;
            border-top: 1px solid var(--border-glass);
            margin-top: auto;
            color: #6A6E7A;
        }
        code {
            background: rgba(22, 23, 28, 0.8);
            border: 1px solid var(--border-glass);
            color: #818CF8;
            padding: 2px 6px; border-radius: 4px;
            font-family: 'Inter', monospace;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="https://levelone.uno/static/Logo.png" alt="levelONE" class="me-2" style="height: 32px;">
                <span class="fw-bold fs-5">levelONE</span>
            </a>
        </div>
    </nav>

    <main class="main-content py-4">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer text-center">
        <div class="container">
            <small>© 2026 levelONE. Todos los derechos reservados.</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
